<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e5e2dd",
                    "on-primary-fixed": "#410004",
                    "on-tertiary-fixed": "#1c1b1b",
                    "surface-container-low": "#f6f3ee",
                    "surface-dim": "#dcdad5",
                    "on-primary-container": "#ffdad7",
                    "on-tertiary-container": "#e4e1e1",
                    "on-surface": "#1c1c19",
                    "inverse-primary": "#ffb3ae",
                    "surface-container-highest": "#e5e2dd",
                    "on-secondary-fixed": "#261900",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#745500",
                    "primary-fixed": "#ffdad7",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#ffb3ae",
                    "primary": "#9d0518",
                    "surface-container-high": "#ebe8e3",
                    "on-primary-fixed-variant": "#930015",
                    "surface-tint": "#b72028",
                    "on-secondary": "#ffffff",
                    "tertiary": "#4d4c4c",
                    "on-surface-variant": "#5a403e",
                    "inverse-surface": "#31302d",
                    "inverse-on-surface": "#f3f0eb",
                    "secondary-fixed": "#ffdea1",
                    "tertiary-fixed": "#e5e2e1",
                    "tertiary-container": "#656464",
                    "surface-bright": "#fcf9f4",
                    "outline-variant": "#e3bebb",
                    "on-error": "#ffffff",
                    "on-background": "#1c1c19",
                    "surface": "#fcf9f4",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "outline": "#8f706d",
                    "on-primary": "#ffffff",
                    "background": "#fcf9f4",
                    "surface-container": "#f0ede9",
                    "secondary-fixed-dim": "#f2bf50",
                    "secondary-container": "#feca5a",
                    "on-error-container": "#93000a",
                    "secondary": "#7a5900",
                    "on-tertiary-fixed-variant": "#474646",
                    "on-secondary-fixed-variant": "#5c4300",
                    "primary-container": "#c0272d",
                    "tertiary-fixed-dim": "#c8c6c5"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Manrope", "sans-serif"],
                    "label": ["Manrope", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fcf9f4;
        }
        h1, h2, h3 {
            font-family: 'Newsreader', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Logo Section -->
<header class="w-full pt-12 pb-8 flex justify-center bg-surface">
<h1 class="text-3xl font-black uppercase tracking-tighter text-primary">
            Komi Heritage
        </h1>
</header>
<!-- Food Photo Strip -->
<section class="w-full h-[150px] overflow-hidden">
<img alt="Traditional West African heritage food display" class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]" data-alt="Close-up of vibrant Ghanaian street food, Kenkey and fried fish with hot pepper sauce, warm sunlight, organic textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmD1socKgaalntsqkLcjwvd-1fG19Vrv_u3mj0SsAuvkanOYk83yKTtlowkSzNr6o_YlXQAmm6vsPZ0heJUZuLdrDOJit5d2k7fe16-YuHwozm_N6PM2G4xO_E9tFgOyvQJ3nKPxRVO5OrNj4AFRxYraP_O-9yZUlQxiyXCQRTXETQDWnscjbl_EDSyIe5ECRzy5ZzEi--MX4du9rq5zm4Gmfmpj_cRbwBIJBx_e4UestlUi95tyj5w2Cr0x6BYCex_plG_x2Z3IQ"/>
</section>
<!-- Main Content Card -->
<main class="w-full px-6 -mt-4 z-10">
<div class="bg-surface-container-lowest p-8 shadow-sm">
<div class="mb-8">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary font-bold mb-1 block">Join the Legacy</span>
<h2 class="text-4xl font-headline italic font-medium text-on-surface tracking-tight">Create Account</h2>
</div>
<!-- Signup Form -->
<form class="space-y-6">
<!-- Full Name -->
<div class="relative">
<label class="block font-label text-[10px] uppercase tracking-wider text-outline mb-1">Full Name</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-on-surface placeholder:text-surface-variant font-body" placeholder="Kofi Mensah" type="text"/>
</div>
<!-- Email -->
<div class="relative">
<label class="block font-label text-[10px] uppercase tracking-wider text-outline mb-1">Email</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-on-surface placeholder:text-surface-variant font-body" placeholder="kofi@example.com" type="email"/>
</div>
<!-- Phone Number -->
<div class="relative">
<label class="block font-label text-[10px] uppercase tracking-wider text-outline mb-1">Phone Number</label>
<div class="flex items-center">
<span class="text-on-surface font-body border-b-2 border-outline-variant py-2 pr-2 text-sm">+233</span>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-on-surface placeholder:text-surface-variant font-body" placeholder="20 123 4567" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="relative">
<label class="block font-label text-[10px] uppercase tracking-wider text-outline mb-1">Password</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-on-surface placeholder:text-surface-variant font-body" placeholder="••••••••" type="password"/>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary font-label font-bold uppercase tracking-[0.15em] py-5 text-sm active:opacity-90 transition-opacity" type="submit">
                    Create Account
                </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
<span class="font-label text-[10px] text-outline uppercase tracking-widest">or</span>
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
</div>
<!-- Google Signup -->
<button class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-label font-bold uppercase tracking-[0.15em] py-4 text-xs flex items-center justify-center gap-3" type="button">
<svg class="w-4 h-4" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
</form>
<!-- Login Redirect -->
<div class="mt-10 text-center">
<p class="font-body text-sm text-tertiary">
                    Already have an account? 
                    <a class="text-primary font-bold border-b-2 border-primary ml-1 pb-0.5" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Simplified Footer -->
<footer class="w-full mt-auto px-8 py-10 flex flex-col items-center gap-4 bg-surface">
<div class="flex gap-6">
<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Support</a>
</div>
<p class="font-label text-[9px] uppercase tracking-[0.25em] text-surface-variant font-bold">
            © THE LIVING ARCHIVE. ACCRA HERITAGE.
        </p>
</footer>
</body></html>
