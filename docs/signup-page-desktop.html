<p class="text-tertiary text-sm">Join the archive and celebrate our heritage.</p>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="label-md block text-[10px] uppercase font-bold tracking-widest text-secondary mb-1">Full Name</label>
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-3 px-0 placeholder:text-surface-dim placeholder:font-light" placeholder="Kwame Mensah" type="text"/>
</div>
<div class="space-y-1">
<label class="label-md block text-[10px] uppercase font-bold tracking-widest text-secondary mb-1">Email Address</label>
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-3 px-0 placeholder:text-surface-dim" placeholder="kwame@heritage.gh" type="email"/>
</div>
<div class="space-y-1">
<label class="label-md block text-[10px] uppercase font-bold tracking-widest text-secondary mb-1">Phone Number</label>
<div class="flex">
<span class="inline-flex items-center px-3 py-3 border-b-2 border-outline-variant bg-surface-container-low text-on-surface font-bold text-sm">+233</span>
<input class="flex-1 bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-3 px-4 placeholder:text-surface-dim" placeholder="24 000 0000" type="tel"/>

</div>
</div>
<button class="w-full bg-primary-container text-white py-4 font-body font-bold uppercase tracking-[0.2em] hover:bg-primary transition-all duration-300 shadow-xl shadow-primary-container/20 mt-4" type="submit">
                            Create Account

<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-[10px] uppercase tracking-widest text-tertiary/50 font-bold">OR</span>
